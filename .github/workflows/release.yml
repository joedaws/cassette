# .github/workflows/release.yml
name: Release

on:
  release:
    types: [published]

jobs:
  build:
    name: Build ${{ matrix.os }}
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            os: linux
            arch: x86_64
            artifact: cassette-linux-x86_64.tar.gz
          # Uncomment when ready to add macOS support:
          # - runner: macos-14
          #   os: macos
          #   arch: aarch64
          #   artifact: cassette-macos-aarch64.tar.gz

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: cargo-registry-${{ matrix.os }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            cargo-registry-${{ matrix.os }}-

      - name: Cache build artifacts
        uses: actions/cache@v4
        with:
          path: target
          key: cargo-build-${{ matrix.os }}-${{ matrix.arch }}-${{ hashFiles('Cargo.lock', 'Cargo.toml') }}
          restore-keys: |
            cargo-build-${{ matrix.os }}-${{ matrix.arch }}-

      - name: Build release binary
        run: cargo build --release

      - name: Package artifact
        run: tar -czf "${{ matrix.artifact }}" -C target/release cassette

      - name: Upload to release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          files: ${{ matrix.artifact }}
